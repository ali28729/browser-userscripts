name: Buy2Day Product Watch

on:
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check-products:
    name: Check Rewards Products
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check Buy2Day products
        id: check
        run: node tools/check-buy2day-products.mjs

      - name: Open notification issue
        if: steps.check.outputs.new_count != '0'
        uses: actions/github-script@v7
        env:
          NOTIFY_GITHUB_USERNAME: ${{ vars.BUY2DAY_NOTIFY_GITHUB_USERNAME }}
        with:
          script: |
            const fs = require("node:fs");
            const summaryPath = "${{ steps.check.outputs.summary_path }}";
            const notifyUser = process.env.NOTIFY_GITHUB_USERNAME?.trim();
            const mention = notifyUser ? `@${notifyUser.replace(/^@/, "")}\n\n` : "";
            const body = `${mention}${fs.readFileSync(summaryPath, "utf8")}`;
            const count = Number("${{ steps.check.outputs.new_count }}");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Buy2Day: ${count} new product${count === 1 ? "" : "s"} detected`,
              body,
            });

      - name: Commit product snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/buy2day-products.json data/buy2day-new-products.md

          if git diff --cached --quiet; then
            echo "No product snapshot changes to commit."
          else
            git commit -m "Update Buy2Day product snapshot"
            git push
          fi
